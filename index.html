<!DOCTYPE html>
<html>
<head>
    <title>Space Shooter</title>
    

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
        }

    
        #gameContainer {
            position: relative;
            width: 400px;
            margin: 40px auto;
        }

        /* CANVAS */
        canvas {
            display: block;
            background: #0a0a1a;
            border: 3px solid #000000;
            border-radius: 10px;
            /* Prevent blurry images */
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        /* UI DI ATAS CANVAS */
        #ui {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
            pointer-events: none;
            font-family: 'Press Start 2P', cursive;
        }

        /* KIRI */
        #leftUI {
            text-align: left;
        }

        /* KANAN */
        #rightUI {
            text-align: right;
        }

        /* TEXT */
        #ui h2 {
            margin: 0;
            font-size: 12px;
            font-family: 'Press Start 2P', cursive;
        }

        #ui p {
            margin: 5px 0;
            font-size: 10px;
            font-family: 'Press Start 2P', cursive;
        }
        
        /* Lives container - holds heart icons */
        #livesContainer {
            margin: 5px 0;
            display: flex;
            gap: 5px;
            align-items: center;
        }
        
        .lifeIcon {
            width: 20px;
            height: 20px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: inline-block;
        }

        canvas {
            box-shadow: 0 0 20px #0a0a1a;
        }
        
        /* Loading indicator */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: cyan;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            z-index: 20;
            font-size: 10px;
            font-family: 'Press Start 2P', cursive;
        }
        
        /* Restart Button */
        #restartBtn {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
        }

        #ui h2, #ui p, #score, #highScore {
            text-shadow: 
                -2px -2px 0 #000000,
                -2px -1px 0 #000000,
                -2px  0px 0 #000000,
                -2px  1px 0 #000000,
                -2px  2px 0 #000000,
                -1px -2px 0 #000000,
                -1px  2px 0 #000000,
                 0px -2px 0 #000000,
                 0px  2px 0 #000000,
                 1px -2px 0 #000000,
                 1px  2px 0 #000000,
                 2px -2px 0 #000000,
                 2px -1px 0 #000000,
                 2px  0px 0 #000000,
                 2px  1px 0 #000000,
                 2px  2px 0 #000000;
        }
    </style>
</head>
<body>

<div id="gameContainer">

    <div id="ui">
        <div id="leftUI">
            <h2>SPACE SHOOTER</h2>
            <div id="livesContainer">
                <!-- Lives will be drawn as heart icons here -->
            </div>
        </div>

        <div id="rightUI">
            <p id="score">SCORE: 0</p>
            <p id="highScore">HIGH SCORE: 0</p>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <button id="restartBtn" style="
        display:none;
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%, -50%);
        padding:12px 25px;
        font-size:12px;
        background: #FFCC00;
        border:2px solid #000000;
        cursor:pointer;
        z-index:10;
        border-radius:5px;
        font-weight:bold;
        font-family:'Press Start 2P', cursive;
    ">
    RESTART
    </button>
</div>

<script>
// =====================
// INITIALIZATION
// =====================
let canvas = document.getElementById("gameCanvas");
let restartBtn = document.getElementById("restartBtn");
let ctx = canvas.getContext("2d");

// IMPORTANT: Disable image smoothing to prevent blurry images
ctx.imageSmoothingEnabled = false;

// =====================
// PLAYER
// =====================
let player = {
    x: 180,
    y: 500,
    width: 70,
    height: 60,
    speed: 5
};

// =====================
// GAME VARIABLES
// =====================
let bullets = [];
let enemies = [];
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;
let lives = 3;
let gameOver = false;
let isDragging = false;

// =====================
// TIMING VARIABLES
// =====================
let shootDelay = 300;
let lastShoot = 0;
let spawnDelay = 1000;
let lastSpawn = 0;

// =====================
// STATIC TWINKLING STARS SYSTEM
// =====================
let stars = [];
let starColors = ["#FFFFFF", "#44AAFF", "#FFDD44", "#FF5555", "#33FFCC", "#FF55FF"];

// Generate 120 stars at random positions
for (let i = 0; i < 120; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: 1 + Math.floor(Math.random() * 3), // 1, 2, or 3 pixels
        color: starColors[Math.floor(Math.random() * starColors.length)],
        baseOpacity: 0.3 + Math.random() * 0.5,
        twinkleSpeed: 0.02 + Math.random() * 0.03,
        twinklePhase: Math.random() * Math.PI * 2
    });
}

// =====================
// LOAD PLAYER SHIP ASSET
// =====================
let playerImg = new Image();
let playerImageLoaded = false;
playerImg.src = "images/enemyship-1.png";

playerImg.onload = function() {
    playerImageLoaded = true;
    console.log("✅ Player ship loaded!");
};

playerImg.onerror = function() {
    console.error("❌ Player ship not found at: images/enemyship-1.png");
    playerImageLoaded = false;
};

// =====================
// LOAD BULLET ASSET
// =====================
let bulletImg = new Image();
let bulletImageLoaded = false;
bulletImg.src = "images/enemy_bullet.png";

bulletImg.onload = function() {
    bulletImageLoaded = true;
    console.log("✅ Bullet image loaded!");
};

bulletImg.onerror = function() {
    console.error("❌ Bullet image not found at: images/enemy_bullet.png");
    bulletImageLoaded = false;
};

// =====================
// LOAD GAME OVER ASSET
// =====================
let gameOverImg = new Image();
let gameOverImageLoaded = false;
gameOverImg.src = "images/game_over.png";

gameOverImg.onload = function() {
    gameOverImageLoaded = true;
    console.log("✅ Game Over image loaded!");
};

gameOverImg.onerror = function() {
    console.error("❌ Game Over image not found at: images/game_over.png");
    gameOverImageLoaded = false;
};

// =====================
// LOAD HEART ICON ASSET (for lives display)
// =====================
let heartIconImg = new Image();
let heartIconLoaded = false;
heartIconImg.src = "images/heart.png";

heartIconImg.onload = function() {
    heartIconLoaded = true;
    console.log("✅ Heart icon loaded!");
    updateLivesDisplay();
};

heartIconImg.onerror = function() {
    console.error("❌ Heart icon not found at: images/heart.png - using fallback");
    heartIconLoaded = false;
    updateLivesDisplay();
};

// =====================
// LOAD ENEMY ASSET
// =====================
let enemyImg = new Image();
let enemyImageLoaded = false;
enemyImg.src = "images/enemy.png";

enemyImg.onload = function() {
    enemyImageLoaded = true;
    console.log("✅ Enemy image loaded!");
};

enemyImg.onerror = function() {
    console.error("❌ Enemy image not found at: images/enemy.png - using fallback drawing");
    enemyImageLoaded = false;
};

// =====================
// UPDATE LIVES DISPLAY WITH HEART ASSETS
// =====================
function updateLivesDisplay() {
    const livesContainer = document.getElementById("livesContainer");
    livesContainer.innerHTML = "";
    
    for(let i = 0; i < lives; i++) {
        const heartDiv = document.createElement("div");
        heartDiv.className = "lifeIcon";
        
        if(heartIconLoaded && heartIconImg.complete) {
            // Use the heart image asset
            heartDiv.style.backgroundImage = `url('${heartIconImg.src}')`;
            heartDiv.style.width = "24px";
            heartDiv.style.height = "24px";
            heartDiv.style.backgroundSize = "contain";
            heartDiv.style.backgroundRepeat = "no-repeat";
            heartDiv.style.backgroundPosition = "center";
        } else {
            // Fallback: draw a red heart shape using CSS
            heartDiv.style.width = "20px";
            heartDiv.style.height = "20px";
            heartDiv.style.backgroundColor = "#FF0000";
            heartDiv.style.border = "2px solid #000000";
            heartDiv.style.borderRadius = "3px";
            heartDiv.style.position = "relative";
        }
        
        livesContainer.appendChild(heartDiv);
    }
}

// =====================
// DRAW STATIC TWINKLING STARS
// =====================
let twinkleTime = 0;

function drawStars() {
    twinkleTime += 0.05; // Increment for animation
    
    for (let star of stars) {
        // Calculate twinkling opacity using sine wave
        let twinkle = Math.sin(twinkleTime * star.twinkleSpeed + star.twinklePhase);
        let opacity = star.baseOpacity + twinkle * 0.3;
        opacity = Math.max(0.2, Math.min(1, opacity)); // Clamp between 0.2 and 1
        
        ctx.fillStyle = star.color;
        ctx.globalAlpha = opacity;
        ctx.fillRect(star.x, star.y, star.size, star.size);
    }
    ctx.globalAlpha = 1; // Reset opacity
}

// =====================
// DRAW GAME OVER TEXT WITH TWINKLE EFFECT
// =====================
let gameOverTwinkle = 0;

function drawGameOverText() {
    gameOverTwinkle += 0.03;
    
    // Calculate twinkling for game over text
    let twinkle = Math.sin(gameOverTwinkle) * 0.3 + 0.7;
    let redIntensity = Math.floor(200 + Math.sin(gameOverTwinkle * 2) * 55);
    
    // Draw black outline (multiple layers for thickness)
    ctx.font = "bold 28px 'Press Start 2P', cursive";
    ctx.textAlign = "center";
    
    // Black outline (thick)
    for(let x = -3; x <= 3; x++) {
        for(let y = -3; y <= 3; y++) {
            if(x !== 0 || y !== 0) {
                ctx.fillStyle = "#000000";
                ctx.fillText("GAME OVER", canvas.width/2 + x, 250 + y);
            }
        }
    }
    
    // Red fill with twinkling
    ctx.fillStyle = `rgb(255, ${Math.floor(50 * twinkle)}, ${Math.floor(50 * twinkle)})`;
    ctx.fillText("GAME OVER", canvas.width/2, 250);
}

// =====================
// DRAW GRADIENT GOLD TEXT WITH WHITE CENTER
// =====================
function drawGradientGoldText(text, x, y, fontSize) {
    ctx.font = `bold ${fontSize}px 'Press Start 2P', cursive`;
    ctx.textAlign = "center";
    
    // Black outline (thick)
    for(let ox = -2; ox <= 2; ox++) {
        for(let oy = -2; oy <= 2; oy++) {
            if(ox !== 0 || oy !== 0) {
                ctx.fillStyle = "#000000";
                ctx.fillText(text, x + ox, y + oy);
            }
        }
    }
    
    // Draw gradient gold base
    let gradient = ctx.createLinearGradient(x - 100, y - 10, x + 100, y + 10);
    gradient.addColorStop(0, "#FFCC00");
    gradient.addColorStop(0.5, "#FFAA00");
    gradient.addColorStop(1, "#FFCC00");
    ctx.fillStyle = gradient;
    ctx.fillText(text, x, y);
    
    // Draw white center highlight (offset slightly)
    ctx.fillStyle = "#FFFFFF";
    ctx.fillText(text, x - 1, y - 1);
    ctx.fillStyle = gradient;
    ctx.fillText(text, x, y);
}

// =====================
// DRAW SCORE TEXT (same as high score color)
// =====================
function drawScoreText(text, x, y, fontSize) {
    ctx.font = `bold ${fontSize}px 'Press Start 2P', cursive`;
    ctx.textAlign = "center";
    
    // Black outline (thick)
    for(let ox = -2; ox <= 2; ox++) {
        for(let oy = -2; oy <= 2; oy++) {
            if(ox !== 0 || oy !== 0) {
                ctx.fillStyle = "#000000";
                ctx.fillText(text, x + ox, y + oy);
            }
        }
    }
    
    // Same yellow/gold color as high score
    ctx.fillStyle = "#FFCC00";
    ctx.fillText(text, x, y);
}

// =====================
// CONTROL MOUSE
// =====================
canvas.addEventListener("mousemove", (e) => {
    if (gameOver) return;
    
    let rect = canvas.getBoundingClientRect();
    let mouseX = e.clientX - rect.left;
    
    let newX = mouseX - player.width / 2;
    newX = Math.max(0, Math.min(newX, canvas.width - player.width));
    player.x = newX;
});

canvas.addEventListener("mousedown", () => {
    if (!gameOver) isDragging = true;
});

canvas.addEventListener("mouseup", () => {
    isDragging = false;
});

canvas.addEventListener("mouseleave", () => {
    isDragging = false;
}); 

// =====================
// CONTROL TOUCH (Mobile)
// =====================
canvas.addEventListener("touchmove", (e) => {
    if (gameOver) return;
    e.preventDefault();
    
    let rect = canvas.getBoundingClientRect();
    let touchX = e.touches[0].clientX - rect.left;
    
    let newX = touchX - player.width / 2;
    newX = Math.max(0, Math.min(newX, canvas.width - player.width));
    player.x = newX;
});

canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
});

// =====================
// UPDATE FUNCTION
// =====================
function update() {
    if(lives <= 0) {
        gameOver = true;
    }

    if(gameOver) {
        restartBtn.style.display = "block";
        return;
    } else {
        restartBtn.style.display = "none";
    }

    // Boundary check
    if(player.x < 0) player.x = 0;
    if(player.x + player.width > canvas.width)
        player.x = canvas.width - player.width;

    let now = Date.now();

    // Auto shoot
    if(now - lastShoot > shootDelay) {
        bullets.push({
            x: player.x + player.width/2,
            y: player.y,
            width: 15,
            height: 25,
            speed: 8
        });
        lastShoot = now;
    }

    // Spawn enemies
    if(now - lastSpawn > spawnDelay) {
        let enemySize = 80;
        enemies.push({
            x: Math.random() * (canvas.width - enemySize) + enemySize/2,
            y: 0,
            size: enemySize,
            speed: 2 + Math.random() * 2
        });
        lastSpawn = now;
    }

    // Update bullets
    for(let i = 0; i < bullets.length; i++) {
        bullets[i].y -= bullets[i].speed;
        
        if(bullets[i].y + bullets[i].height < 0) {
            bullets.splice(i, 1);
            i--;
        }
    }

    // Update enemies & collision detection
    for(let ei = 0; ei < enemies.length; ei++) {
        let e = enemies[ei];
        e.y += e.speed;

        // Check if enemy passed bottom
        if(e.y + e.size/2 > canvas.height) {
            enemies.splice(ei, 1);
            lives--;
            updateLivesDisplay();
            ei--;
            continue;
        }

        // Check bullet-enemy collision
        let hit = false;
        for(let bi = 0; bi < bullets.length; bi++) {
            let b = bullets[bi];
            
            let circleX = e.x;
            let circleY = e.y;
            let radius = e.size/2;
            let rectX = b.x - b.width/2;
            let rectY = b.y;
            
            let closestX = Math.max(rectX, Math.min(circleX, rectX + b.width));
            let closestY = Math.max(rectY, Math.min(circleY, rectY + b.height));
            
            let dx = circleX - closestX;
            let dy = circleY - closestY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if(dist < radius) {
                bullets.splice(bi, 1);
                hit = true;
                score++;
                if(score > highScore) {
                    highScore = score;
                    localStorage.setItem("highScore", highScore);
                }
                break;
            }
        }
        
        if(hit) {
            enemies.splice(ei, 1);
            ei--;
            continue;
        }
        
        // Check player-enemy collision
        let playerLeft = player.x;
        let playerRight = player.x + player.width;
        let playerTop = player.y;
        let playerBottom = player.y + player.height;
        
        let enemyLeft = e.x - e.size/2;
        let enemyRight = e.x + e.size/2;
        let enemyTop = e.y - e.size/2;
        let enemyBottom = e.y + e.size/2;
        
        if(playerRight > enemyLeft && 
           playerLeft < enemyRight && 
           playerBottom > enemyTop && 
           playerTop < enemyBottom) {
            enemies.splice(ei, 1);
            lives--;
            updateLivesDisplay();
            ei--;
        }
    }

    // Update UI
    document.getElementById("score").innerText = "SCORE: " + score;
    document.getElementById("highScore").innerText = "HIGH SCORE: " + highScore;
}

// =====================
// DRAW FUNCTION
// =====================
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw dark space background
    ctx.fillStyle = "#0a0a1a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Draw twinkling stars (static, no movement)
    drawStars();

    // =====================
    // DRAW PLAYER SPACESHIP
    // =====================
    if(playerImageLoaded && playerImg.complete) {
        ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
    } else {
        // Fallback drawing
        ctx.fillStyle = "cyan";
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillStyle = "#00ffff";
        ctx.fillRect(player.x - 5, player.y + 10, 5, 15);
        ctx.fillRect(player.x + player.width, player.y + 10, 5, 15);
        ctx.fillStyle = "white";
        ctx.fillRect(player.x + player.width/2 - 4, player.y + 8, 8, 8);
    }
    
    // =====================
    // DRAW BULLETS
    // =====================
    bullets.forEach(b => {
        if(bulletImageLoaded && bulletImg.complete) {
            ctx.drawImage(bulletImg, b.x - b.width/2, b.y, b.width, b.height);
        } else {
            ctx.fillStyle = "#ffff00";
            ctx.fillRect(b.x - b.width/2, b.y, b.width, b.height);
            ctx.fillStyle = "#ffaa00";
            ctx.fillRect(b.x - b.width/4, b.y, b.width/2, b.height);
        }
    });

    // =====================
    // DRAW ENEMIES (with asset support)
    // =====================
    enemies.forEach(e => {
        if(enemyImageLoaded && enemyImg.complete) {
            // Draw enemy using image asset
            ctx.drawImage(enemyImg, e.x - e.size/2, e.y - e.size/2, e.size, e.size);
        } else {
            // Fallback drawing (original gradient + eyes)
            let gradient = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.size/2);
            gradient.addColorStop(0, "#ff4444");
            gradient.addColorStop(1, "#880000");
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.size/2, 0, Math.PI*2);
            ctx.fill();
            
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(e.x - e.size/6, e.y - e.size/6, e.size/8, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(e.x + e.size/6, e.y - e.size/6, e.size/8, 0, Math.PI*2);
            ctx.fill();
            
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(e.x - e.size/6, e.y - e.size/6, e.size/12, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(e.x + e.size/6, e.y - e.size/6, e.size/12, 0, Math.PI*2);
            ctx.fill();
        }
    });

    // =====================
    // DRAW GAME OVER SCREEN
    // =====================
    if(gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw twinkling stars on top of dark overlay
        drawStars();
        
        // Draw "GAME OVER" text - large, red, black outline, twinkling, centered
        drawGameOverText();
        
        // Draw "SCORE" text - same color as high score (yellow/gold), black outline, centered
        drawScoreText("SCORE: " + score, canvas.width/2, 350, 14);
        
        // Draw "HIGH SCORE" text - shades of gold with white center, black outline, centered
        drawGradientGoldText("HIGH SCORE: " + highScore, canvas.width/2, 400, 12);
        
        // "CLICK RESTART" text REMOVED as requested
    }
}

// =====================
// RESET GAME
// =====================
function resetGame() {
    player.x = 180;
    bullets = [];
    enemies = [];
    score = 0;
    lives = 3;
    gameOver = false;
    lastShoot = Date.now();
    lastSpawn = Date.now();
    restartBtn.style.display = "none";
    updateLivesDisplay();
}

restartBtn.addEventListener("click", resetGame);

// =====================
// KEYBOARD CONTROLS
// =====================
document.addEventListener("keydown", (e) => {
    if(gameOver) return;
    
    if(e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') {
        player.x -= 25;
        player.x = Math.max(0, player.x);
    } else if(e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') {
        player.x += 25;
        player.x = Math.min(canvas.width - player.width, player.x);
    }
});

// =====================
// GAME LOOP
// =====================
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Start the game
gameLoop();
</script>

</body>
</html>
